<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jste offline – ZEdu</title>
    <meta name="theme-color" content="#0F172A" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0F172A; color: #F8FAFC;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }
      .wrap {
        min-height: 100%; display: flex; align-items: center; justify-content: center;
        padding: 24px; text-align: center;
      }
      .card { max-width: 480px; }
      h1 {
        margin: 0 0 12px; font-size: 28px; font-weight: 700;
        background: linear-gradient(135deg, #6EC6D9, #9B6CFF);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      p { margin: 0 0 20px; color: #CBD5E1; line-height: 1.5; }
      button {
        background: #0F9A8B; color: #FFFFFF; border: 0;
        padding: 12px 22px; border-radius: 14px; font-weight: 600;
        font-size: 15px; cursor: pointer;
      }
      button:hover { filter: brightness(1.05); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Jste offline</h1>
        <p>Zkontrolujte připojení k internetu a zkuste to znovu.</p>
        <button onclick="location.reload()">Zkusit znovu</button>
      </div>
    </div>
  </body>
</html>
